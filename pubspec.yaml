name: alfafut_app
description: "AlfaFut - Gestao de patota de futebol com acessibilidade."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Estado
  flutter_riverpod: ^2.6.1

  # Roteamento
  go_router: ^14.6.2

  # Rede
  dio: ^5.7.0

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3

  # Utilitarios
  intl: ^0.20.2
  logger: ^2.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
